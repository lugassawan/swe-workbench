name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Keep in sync with .githooks/commit-msg
          PATTERN='^\[(feat|fix|refactor|test|ci|docs|perf|chore|polish|breaking)\]:? .+'
          if ! echo "$PR_TITLE" | grep -qE "$PATTERN"; then
            echo "::error::PR title must match format: [type] Description or [type]: Description (e.g. [feat] Add new feature or [chore]: Bump dep)"
            echo ""
            echo "Allowed types: feat, fix, refactor, test, ci, docs, perf, chore, polish, breaking"
            exit 1
          fi

      - name: Validate PR description
        # Intentionally runs for dependabot[bot] too — Dependabot bodies always contain release notes.
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          TRIMMED=$(echo "$PR_BODY" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$TRIMMED" ]; then
            echo "::error::PR description must not be empty"
            exit 1
          fi

      - name: Validate commit authorship
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BAD=$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}/commits" \
            --jq '.[].commit.author.email' \
            | grep -E '^(test@example\.com|t@t(\.com)?)$' || true)
          if [ -n "$BAD" ]; then
            echo "::error::PR contains commits from a placeholder test identity: $BAD"
            echo "Rewrite with: git rebase main --exec 'git commit --amend --reset-author --no-edit'"
            exit 1
          fi

      - name: Validate issue reference
        # Dependabot cannot inject closing keywords; dependency bumps have no linked issue.
        if: github.actor != 'dependabot[bot]'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Strip HTML comments first so example text inside <!-- ... --> blocks
          # (e.g. "Issue: N/A" documentation in the PR template) does not
          # accidentally match the opt-out or closing-keyword patterns.
          PR_BODY_VISIBLE=$(echo "$PR_BODY" | python3 -c \
            "import re,sys; print(re.sub(r'<!--.*?(?:-->|$)','',sys.stdin.read(),flags=re.DOTALL))")

          # Allow ad-hoc PRs that explicitly opt out with "N/A" or "Issue: N/A" on its own line.
          # Accepts: "N/A", "Issue: N/A", "Issue: N/A — reason", "N/A — reason".
          if echo "$PR_BODY_VISIBLE" | grep -iqE '^[[:space:]]*(Issue:[[:space:]]+)?N/A([[:space:]]+[—\-].+)?[[:space:]]*$'; then
            echo "Issue reference opted out with N/A — skipping check"
            exit 0
          fi

          # Require a GitHub closing keyword (case-insensitive).
          # "Closes N/A" or "Closes #N/A" will NOT match the N/A check above (not a standalone line)
          # and will NOT match this check — so they correctly fail CI.
          if ! echo "$PR_BODY_VISIBLE" | grep -iqE '(close[sd]?|fix(e[sd])?|resolve[sd]?) #[0-9]+'; then
            echo "::error::PR body must reference an issue with a closing keyword"
            echo ""
            echo "Add one of these to your PR description:"
            echo "  Closes #123"
            echo "  Fixes #123"
            echo "  Resolves #123"
            echo ""
            echo "For ad-hoc changes without an issue, add a standalone 'N/A' or 'Issue: N/A' line."
            echo ""
            echo "See: https://docs.github.com/en/issues/tracking-your-work-with-issues/using-issues/linking-a-pull-request-to-an-issue"
            exit 1
          fi

  validate-plugin-files:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Validate plugin files
        run: bash scripts/validate.sh

  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck (warning+ on all *.sh + githooks)
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          severity: warning
          additional_files: 'commit-msg pre-commit pre-push'
          check_together: 'yes'

  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install --require-hashes -r tests/requirements.lock
      - run: pytest tests/ -v

  lockfile-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Verify lockfiles are up to date
        run: bash scripts/lock-pip-requirements.sh --check

  markdown-links:
    name: Markdown link check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Check markdown links (lychee)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          args: --config .lychee.toml './**/*.md'
          fail: true
