name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate JSON well-formedness
        run: |
          jq empty .claude-plugin/plugin.json
          jq empty .claude-plugin/marketplace.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate manifests against vendored JSON schemas
        run: |
          python3 -m pip install --quiet 'jsonschema==4.23.0'
          python3 - <<'PY'
          import json, sys
          from jsonschema import Draft7Validator
          targets = [
              (".claude-plugin/plugin.json",      ".claude-plugin/schemas/plugin.schema.json"),
              (".claude-plugin/marketplace.json", ".claude-plugin/schemas/marketplace.schema.json"),
          ]
          failed = False
          for doc_path, schema_path in targets:
              with open(doc_path) as f: doc = json.load(f)
              with open(schema_path) as f: schema = json.load(f)
              errors = sorted(Draft7Validator(schema).iter_errors(doc), key=lambda e: list(e.absolute_path))
              if errors:
                  failed = True
                  print(f"::error file={doc_path}::{len(errors)} schema violation(s)")
                  for e in errors:
                      loc = "/".join(str(p) for p in e.absolute_path) or "<root>"
                      print(f"  {doc_path} @ {loc}: {e.message}")
          sys.exit(1 if failed else 0)
          PY

      - name: Verify tag matches manifest versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PLUGIN_VER=$(jq -r .version .claude-plugin/plugin.json)
          MKT_VER=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          if [ "$TAG" != "$PLUGIN_VER" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (=$TAG) does not match plugin.json version ($PLUGIN_VER)"
            exit 1
          fi
          if [ "$TAG" != "$MKT_VER" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (=$TAG) does not match marketplace.json version ($MKT_VER)"
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
