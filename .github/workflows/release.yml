name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-schemas:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Validate JSON well-formedness
        run: |
          jq empty .claude-plugin/plugin.json
          jq empty .claude-plugin/marketplace.json

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Validate manifests against vendored JSON schemas
        run: |
          python3 -m pip install --require-hashes -r tests/release-requirements.lock
          python3 - <<'PY'
          import json, sys
          from jsonschema import Draft7Validator
          targets = [
              (".claude-plugin/plugin.json",      ".claude-plugin/schemas/plugin.schema.json"),
              (".claude-plugin/marketplace.json", ".claude-plugin/schemas/marketplace.schema.json"),
          ]
          failed = False
          for doc_path, schema_path in targets:
              with open(doc_path) as f: doc = json.load(f)
              with open(schema_path) as f: schema = json.load(f)
              errors = sorted(Draft7Validator(schema).iter_errors(doc), key=lambda e: list(e.absolute_path))
              if errors:
                  failed = True
                  print(f"::error file={doc_path}::{len(errors)} schema violation(s)")
                  for e in errors:
                      loc = "/".join(str(p) for p in e.absolute_path) or "<root>"
                      print(f"  {doc_path} @ {loc}: {e.message}")
          sys.exit(1 if failed else 0)
          PY

      - name: Verify tag matches manifest versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PLUGIN_VER=$(jq -r .version .claude-plugin/plugin.json)
          MKT_VER=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          if [ "$TAG" != "$PLUGIN_VER" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (=$TAG) does not match plugin.json version ($PLUGIN_VER)"
            exit 1
          fi
          if [ "$TAG" != "$MKT_VER" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (=$TAG) does not match marketplace.json version ($MKT_VER)"
            exit 1
          fi

  publish-release:
    needs: validate-schemas
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # gh release view exits 1 when the release doesn't exist; stderr is
          # intentionally preserved so auth/network errors remain visible.
          if gh release view "$GITHUB_REF_NAME" >/dev/null; then
            echo "Release $GITHUB_REF_NAME already exists — skipping."
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          fi
